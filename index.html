<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행사 플래닝 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
import{getFirestore,collection,doc,onSnapshot,setDoc,deleteDoc}from"https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";
const FC={apiKey:"AIzaSyAvm5UkjmQ-Q1mdDTJXzuzcjPvUb0cGPu4",authDomain:"eventplanning26.firebaseapp.com",projectId:"eventplanning26",storageBucket:"eventplanning26.firebasestorage.app",messagingSenderId:"644192340413",appId:"1:644192340413:web:39f78de793b0683d83aad4"};
const app=initializeApp(FC);const db=getFirestore(app);
const PH=['기획·준비','홍보·모집','운영 준비','행사 당일','사후 관리'];
const PI=['🔦','📢','⚙️','📅','📊','🎯','💡','🔔','📌','🗂️'];
const PC=[{bg:'#e6f1fb',ic:'#185fa5',br:'#378add'},{bg:'#e1f5ee',ic:'#0f6e56',br:'#1d9e75'},{bg:'#faeeda',ic:'#854f0b',br:'#ba7517'},{bg:'#fbeaf0',ic:'#993556',br:'#d4537e'},{bg:'#eaf3de',ic:'#3b6d11',br:'#639922'},{bg:'#f0edfc',ic:'#5340b8',br:'#7b6de0'},{bg:'#fef4e4',ic:'#9c5700',br:'#d4850a'},{bg:'#e8faf3',ic:'#0a6e47',br:'#17a86c'},{bg:'#fce8f0',ic:'#8c1b4b',br:'#c73474'},{bg:'#f5f5f3',ic:'#444',br:'#888'}];
const AVC=[{bg:'#e6f1fb',fg:'#0c447c'},{bg:'#e1f5ee',fg:'#085041'},{bg:'#faeeda',fg:'#633806'},{bg:'#fbeaf0',fg:'#72243e'},{bg:'#eaf3de',fg:'#27500a'},{bg:'#f0edfc',fg:'#3c2f8a'},{bg:'#fef4e4',fg:'#7a3e00'},{bg:'#e8faf3',fg:'#074d31'},{bg:'#fce8f0',fg:'#6b1236'},{bg:'#f5f5f3',fg:'#333'}];
const CC=['#85b7eb','#9fe1cb','#fac775','#f5c4b3','#afa9ec','#5dcaa5','#f4c0d1','#b4b2a9','#97c459'];
const DEF=['장소·대관비','A/V·장비','케이터링','인쇄·홍보물','기념품','운영인력','촬영·영상','기타'];
const PCOLS=['#378add','#1d9e75','#ba7517','#d4537e','#639922','#7b6de0','#d4850a','#17a86c','#c73474','#888'];
let PJS=[],CUR=null,TAB='dash',SEL=null,EDIT=false,charts={},unsub=null;
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let expandedTasks={};
const cp=()=>CUR!==null?PJS[CUR]:null;
const $=id=>document.getElementById(id);
const n=v=>parseInt(v)||0;
const f=v=>n(v).toLocaleString();
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const memName=m=>typeof m==='object'?m.name:m;
// 프로젝트별 단계 배열 반환 (기본 5개 + 추가 가능)
function getPhases(p){
  if(!p)return PH.slice();
  const names=p.phaseNames||[...PH];
  // phases 배열 길이만큼 보장
  const cnt=p.phaseCount||names.length||5;
  const result=[];
  for(let i=0;i<cnt;i++) result.push(names[i]||('단계 '+(i+1)));
  return result;
}
function addPhase(p){
  if(!p)return;
  if(!p.phaseNames)p.phaseNames=[...PH];
  if(!p.phaseCount)p.phaseCount=p.phaseNames.length||5;
  if(p.phaseCount>=10){alert('단계는 최대 10개까지 추가할 수 있어요.');return;}
  p.phaseNames.push('새 단계 '+(p.phaseCount+1));
  p.phaseCount++;
  saveProject(p);
  if(TAB==='dash'){renderPG();renderTP();}else renderBoard();
}
function addPhaseNow(){addPhase(cp());}
function removePhaseNow(i){removePhase(cp(),i);}
function removePhase(p,i){
  if(!p)return;
  const phases=getPhases(p);
  if(phases.length<=1){alert('단계는 최소 1개 이상 필요해요.');return;}
  const hasTask=p.tasks.some(t=>t.phase===i);
  if(hasTask&&!confirm('이 단계에 태스크가 있어요. 단계를 삭제하면 해당 태스크들도 함께 삭제돼요. 계속할까요?'))return;
  if(!p.phaseNames)p.phaseNames=[...PH];
  p.phaseNames.splice(i,1);
  p.phaseCount=p.phaseNames.length;
  // 해당 단계 태스크 제거, 상위 단계 index 조정
  p.tasks=p.tasks.filter(t=>t.phase!==i).map(t=>{if(t.phase>i)t.phase--;return t;});
  saveProject(p);
  SEL=null;
  if(TAB==='dash'){renderPG();renderTP();}else renderBoard();
}
// ── 언두 히스토리 ──
const MAX_UNDO=30;
let undoStack=[];
function pushUndo(p){
  if(!p)return;
  try{
    undoStack.push(JSON.stringify(p));
    if(undoStack.length>MAX_UNDO)undoStack.shift();
  }catch(e){}
}
function undoLast(){
  if(!undoStack.length){showToast('더 이상 되돌릴 내용이 없어요');return;}
  const snap=undoStack.pop();
  try{
    const restored=JSON.parse(snap);
    const idx=PJS.findIndex(p=>p.fbId===restored.fbId);
    if(idx<0)return;
    PJS[idx]=restored;
    saveProject(restored);
    if(CUR===idx){if(TAB==='dash'){renderPG();renderTP();}else if(TAB==='board')renderBoard();else if(TAB==='team')renderTeam();else if(TAB==='budget')renderBudget();else if(TAB==='calendar')renderCalendar();}
    renderSB();
    showToast('↩ 되돌렸어요');
  }catch(e){}
}
function showToast(msg){
  let t=$('undoToast');
  if(!t){t=document.createElement('div');t.id='undoToast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:300;pointer-events:none;transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._to);t._to=setTimeout(()=>{t.style.opacity='0';},1800);
}
async function saveProject(pj){try{await setDoc(doc(db,'projects',pj.fbId),JSON.parse(JSON.stringify(pj)));}catch(e){alert('저장 실패: '+e.message);}}
async function removeProject(id){try{await deleteDoc(doc(db,'projects',id));}catch(e){}}
function subscribeProjects(){
  if(unsub)unsub();
  unsub=onSnapshot(collection(db,'projects'),snap=>{
    const r=[];snap.forEach(d=>r.push(d.data()));r.sort((a,b)=>a.createdAt-b.createdAt);
    PJS=r;if(CUR!==null&&CUR>=PJS.length)CUR=PJS.length>0?0:null;
    renderSB();if(CUR!==null)showDash();else showView('vEmpty');
  });
}
function mkTask(phase,name,priority,assignee,parentId=null){
  return{id:uid(),phase,name,priority,assignees:[{name:assignee,role:'main'}],parentId,startDate:'',endDate:'',done:false,notes:''};
}
function mkTasks(mems){
  const m=mems.length||1,p=i=>memName(mems[i%m])||'미정';
  return[[0,'행사 목적·목표 설정','high',0],[0,'예산 계획 수립','high',1],[0,'장소 섭외 및 계약','high',0],[0,'VIP 초청 대상 리스트','high',2],[0,'행사 일정표 초안','mid',1],[0,'발표자·연사 섭외','high',0],[1,'홍보물 디자인','mid',3],[1,'VIP 초청장 발송','high',2],[1,'SNS·이메일 홍보','mid',3],[1,'참가 신청 페이지 구축','high',1],[1,'등록 현황 모니터링','low',3],[2,'기념품 제작 발주','mid',1],[2,'동선·좌석 배치 확정','mid',2],[2,'발표 자료 최종 수령','high',0],[2,'AV 장비 점검','high',2],[2,'현장 스태프 역할 배분','high',0],[2,'리허설 진행','high',0],[3,'참가자 등록·입장','high',3],[3,'VIP 의전 및 안내','high',2],[3,'발표 세션 진행 지원','high',0],[3,'만족도 조사 배포·수거','low',3],[3,'기념품 배포','low',3],[4,'만족도 조사 분석','mid',3],[4,'참가자 감사 메일','mid',1],[4,'상담 후속 연계','high',2],[4,'행사 결과 보고서','high',0],[4,'정산 및 비용 마감','mid',1]].map(([ph,nm,pr,ai])=>mkTask(ph,nm,pr,p(ai)));
}
function mkBudget(t){return{total:n(t),cats:DEF.map((name,i)=>({id:'c'+i,name,planned:0,actual:0})),nid:DEF.length,notes:''};}
function mkResult(){return{isDone:false,attendees:'',registered:'',vip:'',budget:'',actual:'',satisfaction:'',satD:[0,0,0,0,0],leads:'',mou:'',followup:'',mediaCount:'',mediaList:[],onlineViews:'',onlineReach:'',keywords:[],successPoints:'',improvements:'',starRating:0};}
function calcDday(ds){if(!ds)return null;const t=new Date();t.setHours(0,0,0,0);const e=new Date(ds);e.setHours(0,0,0,0);return Math.round((e-t)/(864e5));}
function ddayLabel(d){if(d===null)return{txt:'날짜 미설정',cls:'nodday'};if(d>0)return{txt:'D-'+d,cls:d<=7?'urgent':d<=30?'soon':'ok'};if(d===0)return{txt:'D-DAY',cls:'done'};return{txt:'D+'+Math.abs(d),cls:'done'};}
function pPct(p,i){if(p.mp&&p.mp[i]!==undefined)return p.mp[i];const ts=p.tasks.filter(t=>t.phase===i&&!t.parentId);if(!ts.length)return 0;return Math.round(ts.filter(t=>t.done).length/ts.length*100);}
function tPct(p){const ts=p.tasks.filter(t=>!t.parentId);return ts.length?Math.round(ts.filter(t=>t.done).length/ts.length*100):0;}
function bPl(p){return(p.budget.cats||[]).reduce((s,c)=>s+n(c.planned),0);}
function bAc(p){return(p.budget.cats||[]).reduce((s,c)=>s+n(c.actual),0);}
function getMemNames(p){return['미정',...(p.members||[]).map(m=>memName(m))];}
function getMain(t){const a=(t.assignees||[]).find(a=>a.role==='main');return a?a.name:(t.assignees&&t.assignees[0]?t.assignees[0].name:'미정');}
function getSubs(t){return(t.assignees||[]).filter(a=>a.role==='sub').map(a=>a.name);}
function getChildren(p,pid){return p.tasks.filter(t=>t.parentId===pid);}
function renderSB(){
  const sb=$('SB');let html='<div class="sb-header">행사 목록</div>';
  html+=PJS.map((p,i)=>{
    const isDone=p.result&&p.result.isDone,d=calcDday(p.startDate),dl=ddayLabel(d),nm=p.name||('새 행사 '+(i+1));
    const dr=p.startDate&&p.endDate?p.startDate.slice(5).replace('-','/')+'~'+p.endDate.slice(5).replace('-','/'):null;
    return '<div class="pn'+(i===CUR?' act':'')+(isDone?' fin':'')+'" onclick="selPj('+i+')" title="'+nm+'"><span class="pn-name">'+nm+'</span><span class="pn-dday '+dl.cls+'">'+(isDone?'✓ 완료':dr||dl.txt)+'</span>'+(isDone?'<span class="ddot"></span>':'')+'</div>';
  }).join('');
  html+='<div class="pn addp" onclick="newPj()">+ 새 행사 추가</div>';
  sb.innerHTML=html;
}
function toggleSB(){
  const sb=$('SB'),ov=$('sbOverlay');
  const open=sb.classList.toggle('open');
  if(ov)ov.style.display=open?'block':'none';
}
function closeSB(){
  const sb=$('SB'),ov=$('sbOverlay');
  sb.classList.remove('open');
  if(ov)ov.style.display='none';
}
window.toggleSB=toggleSB;window.closeSB=closeSB;
function selPj(i,pushState=true){
  CUR=i;SEL=null;TAB='dash';expandedTasks={};
  renderSB();
  if(pushState)history.pushState({pj:i,tab:'dash'},'','#dash-pj'+i);
  showDash();
  closeSB();
  const mt=$('mobileTitle');if(mt&&PJS[i])mt.textContent=PJS[i].name||'행사 플래닝';
}
function showView(id){['vEmpty','vDash'].forEach(v=>$(v).classList.remove('active'));$(id).classList.add('active');}
function showDash(){
  showView('vDash');const p=cp();if(!p)return;
  const d=calcDday(p.startDate),dl=ddayLabel(d);
  $('dbTitle').innerHTML=p.name+' <span class="sbadge '+(p.result&&p.result.isDone?'s-fin':'s-act')+'">'+(p.result&&p.result.isDone?'완료':dl.txt!=='날짜 미설정'?dl.txt:'진행중')+'</span>';
  let dt='';if(p.startDate&&p.endDate)dt=' · '+p.startDate.replace(/-/g,'/')+' ~ '+p.endDate.replace(/-/g,'/');else if(p.startDate)dt=' · '+p.startDate.replace(/-/g,'/');
  $('dbSub').textContent=[p.type,p.scale].filter(Boolean).join(' · ')+dt;
  sw(TAB);
}
function sw(t,pushState=true){
  TAB=t;['dash','board','team','budget','result','calendar'].forEach(nm=>{const el=$('TAB_'+nm.toUpperCase());if(el)el.style.display=nm===t?'block':'none';const b=$('tb-'+nm);if(b)b.classList.toggle('on',nm===t);});
  if(pushState)history.pushState({pj:CUR,tab:t},'','#'+t+(CUR!==null?'-pj'+CUR:''));
  if(t==='dash')renderDash();else if(t==='board')renderBoard();else if(t==='team')renderTeam();else if(t==='budget')renderBudget();else if(t==='result')renderResult();else if(t==='calendar')renderCalendar();
}
function renderDash(){
  const p=cp();if(!p)return;
  const top=p.tasks.filter(t=>!t.parentId),tot=top.length,done=top.filter(t=>t.done).length,pct=tPct(p),hi=top.filter(t=>t.priority==='high'&&!t.done).length;
  const ba=bAc(p),bt=p.budget.total,bPct=bt>0?Math.round(ba/bt*100):null;
  const bKpi=bt>0?'<div class="kcard"><div class="klbl">예산 집행</div><div class="kval '+(bPct>100?'r':bPct>80?'a':'b')+'">'+bPct+'%</div></div>':'<div class="kcard"><div class="klbl">긴급 미완료</div><div class="kval '+(hi>0?'a':'')+'">'+hi+'</div></div>';
  const bBar=bt>0?'<div class="notice n-amber">💰 총 예산 '+f(bt)+'만원 · 집행 '+f(ba)+'만원 · 잔여 <strong>'+f(bt-ba)+'만원</strong><button class="n-btn" style="background:#faeeda;border:1px solid #fac775;color:#633806" onclick="sw(\'budget\')">예산 상세</button></div>':'';
  const d=calcDday(p.startDate);let ddB='';
  const evName=p.name||'행사';
  if(d!==null&&!(p.result&&p.result.isDone)){
    const endD=p.endDate?calcDday(p.endDate):null;
    const rng=p.startDate&&p.endDate?p.startDate.replace(/-/g,'/')+' ~ '+p.endDate.replace(/-/g,'/'):null;
    if(d===0)ddB='<div class="dday-banner today">🎉 <span class="dday-num">D-DAY</span> <strong>'+evName+'</strong> 오늘 시작!'+(rng?' · '+rng:'')+'</div>';
    else if(d>0)ddB='<div class="dday-banner '+(d<=7?'urgent':d<=30?'soon':'ok')+'">📅 <strong>'+evName+'</strong>까지 <span class="dday-num">D-'+d+'</span>'+(rng?' · '+rng:'')+' '+(d<=7?'⚠️ 곧 행사입니다!':d<=30?'준비에 박차를!':'')+'</div>';
    else if(endD!==null&&endD>=0)ddB='<div class="dday-banner today">🎯 <strong>'+evName+'</strong> <span class="dday-num">진행 중</span>'+(rng?' · '+rng:'')+'</div>';
    else ddB='<div class="dday-banner today">✅ <strong>'+evName+'</strong> 종료 성과를 입력해보세요! <button class="n-btn" style="background:#eaf3de;border:1px solid #97c459;color:#27500a" onclick="sw(\'result\')">성과 입력</button></div>';
  }
  // 공유 메모(공지)
  const memo=p.sharedMemo||'';
  const memoBlock='<div class="shared-memo-wrap"><div class="shared-memo-hd"><span>📌 팀 공지 · 메모</span><span style="font-size:11px;color:#aaa;font-weight:400">모든 팀원이 볼 수 있어요</span></div><textarea class="shared-memo-ta" id="sharedMemoTA" placeholder="행사 목적, 주요 공지, 메모 등을 자유롭게 입력하세요...">'+memo+'</textarea><div style="display:flex;justify-content:flex-end;margin-top:6px"><button class="bb" onclick="saveSharedMemo()" style="font-size:11px;padding:5px 12px">💾 저장</button></div></div>';
  $('TAB_DASH').innerHTML=ddB+memoBlock+'<div class="krow"><div class="kcard"><div class="klbl">전체 태스크</div><div class="kval">'+tot+'</div></div><div class="kcard"><div class="klbl">완료</div><div class="kval g">'+done+'</div></div><div class="kcard"><div class="klbl">진행률</div><div class="kval '+(pct>=70?'g':pct>=30?'a':'')+'">'+pct+'%</div></div>'+bKpi+'</div>'+bBar+'<div class="pgrid" id="PG"></div><div id="TP"></div><div class="bbar"><button class="bb" onclick="exportCSV()">📥 CSV</button><button class="bb" onclick="sw(\'calendar\')">📆 캘린더</button><button class="bb" style="margin-left:auto;color:#a32d2d" onclick="delPj()">🗑️ 삭제</button></div>';
  renderPG();renderTP();
}
function saveSharedMemo(){
  const p=cp();if(!p)return;
  const el=$('sharedMemoTA');if(!el)return;
  p.sharedMemo=el.value;
  saveProject(p);
  // 저장 피드백
  el.style.borderColor='#97c459';
  setTimeout(()=>{if(el)el.style.borderColor='';},1000);
}
function renderPG(){
  const p=cp();const g=$('PG');if(!p||!g)return;
  const phases=getPhases(p);
  g.innerHTML=phases.map((name,i)=>{
    const ts=p.tasks.filter(t=>t.phase===i&&!t.parentId),done=ts.filter(t=>t.done).length,pct=pPct(p,i),col=PC[i%PC.length],isM=p.mp&&p.mp[i]!==undefined,isSel=SEL===i;
    const c=pct>=80?'#3b6d11':pct>=50?'#854f0b':'#1a1a1a';
    return '<div class="pc'+(isSel?' sel':'')+'" id="pc-'+i+'" draggable="true" ondragstart="phaseDragStart(event,'+i+')" ondragover="phaseDragOver(event,'+i+')" ondrop="phaseDragDrop(event,'+i+')" ondragend="phaseDragEnd(event)" onclick="clickPC(event,'+i+')">'
      +'<div class="pc-top">'
      +'<div class="pc-ic" style="background:'+col.bg+';flex-shrink:0">'+(PI[i]||'📋')+'</div>'
      +'<span class="phase-num-badge editable-phase-num" onclick="event.stopPropagation();editPhaseNum('+i+')" title="클릭하여 번호 수정" id="pnb-'+i+'">'+(p.phaseNums&&p.phaseNums[i]!==undefined?p.phaseNums[i]:(i+1))+'단계</span>'
      +'<span class="pc-nm editable-phase" ondblclick="editPhaseName('+i+')" title="더블클릭으로 수정" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+name+'</span>'
      +'<span class="pc-pct" style="color:'+c+';flex-shrink:0">'+pct+'%</span>'
      +'</div>'
      +'<div class="pc-ct">'+done+'/'+ts.length+(isM?' · 수동':'')+'</div>'
      +'<div class="pbar"><div class="pfill" style="width:'+pct+'%;background:'+col.br+'"></div></div>'
      +'<div class="mpr" onclick="event.stopPropagation()"><input type="number" class="mpi" min="0" max="100" value="'+pct+'" id="mp'+i+'"><span class="mplbl">%</span><button class="mpb" onclick="applyM('+i+')">적용</button>'+(isM?'<button class="mpb" style="color:#aaa" onclick="clearM('+i+')">초기화</button>':'')+'<button class="mpb" style="color:#c44;margin-left:auto" onclick="event.stopPropagation();removePhaseNow('+i+')">🗑</button></div>'
      +'</div>';
  }).join('')+'<div class="pc pc-add" onclick="addPhaseNow()"><div style="font-size:24px;color:#ccc;margin-bottom:6px">+</div><div style="font-size:12px;color:#aaa">단계 추가</div></div>';
}
let phaseDragIdx=null;
function phaseDragStart(e,i){phaseDragIdx=i;setTimeout(()=>{const el=$('pc-'+i);if(el)el.style.opacity='.4';},0);}
function phaseDragEnd(e){
  phaseDragIdx=null;
  document.querySelectorAll('.pc').forEach(el=>{el.style.opacity='';el.classList.remove('pc-drag-over');});
}
function phaseDragOver(e,i){
  e.preventDefault();
  if(phaseDragIdx===null||phaseDragIdx===i)return;

function phaseDragDrop(e,toIdx){
  e.preventDefault();
  if(phaseDragIdx===null||phaseDragIdx===toIdx)return;
  const p=cp();if(!p)return;
  const phases=getPhases(p);
  // swap phases
  if(!p.phaseNames)p.phaseNames=[...phases];
  const [moved]=p.phaseNames.splice(phaseDragIdx,1);
  p.phaseNames.splice(toIdx,0,moved);
  if(p.mp){const keys=Object.keys(p.mp);const newMp={};keys.forEach(k=>{const ki=parseInt(k);if(ki===phaseDragIdx)newMp[toIdx]=p.mp[k];else if(ki>=Math.min(phaseDragIdx,toIdx)&&ki<=Math.max(phaseDragIdx,toIdx))newMp[ki+(phaseDragIdx<toIdx?-1:1)]=p.mp[k];else newMp[ki]=p.mp[k];});p.mp=newMp;}
  // remap task phases
  const from=phaseDragIdx,to=toIdx;
  p.tasks.forEach(t=>{
    if(t.phase===from)t.phase=-1;
    else if(from<to&&t.phase>from&&t.phase<=to)t.phase--;
    else if(from>to&&t.phase>=to&&t.phase<from)t.phase++;
  });
  p.tasks.forEach(t=>{if(t.phase===-1)t.phase=to;});
  phaseDragIdx=null;
  saveProject(p);renderPG();renderTP();
}

function renderCalendar(){

'✓':'')+'</div>'+c.name+' <span style="color:#aaa;font-size:10px">· '+getMain(c)+'</span><button onclick="openTaskModal(\''+c.id+'\')" style="background:none;border:none;cursor:pointer;color:#aaa;font-size:12px;margin-left:auto">✏️</button></div>').join('')+'</div>':'')+'<div class="fg"><label class="fl">하위 업무 추가</label><div style="display:flex;gap:6px"><input type="text" class="fi" id="tm-child-name" placeholder="하위 업무명"><button class="add-btn" onclick="addChildModal(\''+taskId+'\')">+ 추가</button></div></div>';

function addSubModal(){
  const sel=$('tm-sub-sel');if(!sel||!sel.value||sel.value==='')return;
  const nm=sel.value;const p=cp();if(!p)return;
  const t=p.tasks.find(x=>x.id===$('taskModal').dataset.taskId);if(!t)return;
  if(!(t.assignees||[]).some(a=>a.name===nm)){if(!t.assignees)t.assignees=[];t.assignees.push({name:nm,role:'sub'});saveProject(p);openTaskModal($('taskModal').dataset.taskId);}
}
function removeSubModal(idx){
  const p=cp();if(!p)return;const t=p.tasks.find(x=>x.id===$('taskModal').dataset.taskId);if(!t)return;
  const subs=(t.assignees||[]).filter(a=>a.role==='sub');const toRm=subs[idx];
  if(toRm)t.assignees=t.assignees.filter(a=>!(a.role==='sub'&&a.name===toRm.name));
  saveProject(p);openTaskModal($('taskModal').dataset.taskId);
}
function addChildModal(parentId){
  const inp=$('tm-child-name');if(!inp||!inp.value.trim())return;
  const p=cp();if(!p)return;const par=p.tasks.find(x=>x.id===parentId);if(!par)return;
  p.tasks.push(mkTask(par.phase,inp.value.trim(),'mid',getMain(par),parentId));
  inp.value='';saveProject(p);openTaskModal(parentId);
}
function saveTaskModal(){
  const p=cp();if(!p)return;const taskId=$('taskModal').dataset.taskId;
  if(taskId==='__cal_new__'){
    const nm=$('cal-nm');if(!nm||!nm.value.trim())return;
    const pi=parseInt($('cal-ph').value)||0;
    const pr=$('cal-pr').value||'mid';
    const assign=$('cal-assign').value||'미정';
    const t=mkTask(pi,nm.value.trim(),pr,assign);
    t.startDate=$('cal-start').value||'';t.endDate=$('cal-end').value||'';
    p.tasks.push(t);saveProject(p);$('taskModal').classList.remove('open');renderCalendar();return;
  }
  const t=p.tasks.find(x=>x.id===taskId);if(!t)return;
  pushUndo(p);
  t.name=$('tm-name').value.trim()||t.name;t.priority=$('tm-priority').value;t.phase=parseInt($('tm-phase').value);
  const nm=$('tm-main').value;const curSubs=(t.assignees||[]).filter(a=>a.role==='sub');
  t.assignees=[{name:nm,role:'main'},...curSubs];
  t.startDate=$('tm-start').value||'';t.endDate=$('tm-end').value||'';t.notes=$('tm-notes').value||'';
  saveProject(p);$('taskModal').classList.remove('open');
  if(TAB==='dash'){renderPG();renderTP();}else if(TAB==='board')renderBoard();else if(TAB==='calendar')renderCalendar();
}
function closeTaskModal(){$('taskModal').classList.remove('open');}
function editPhaseNum(i){
  const badge=$('pnb-'+i);if(!badge)return;
  const p=cp();if(!p)return;
  if(!p.phaseNums)p.phaseNums=getPhases(p).map((_,idx)=>idx+1+'단계'.replace('단계','')+(idx+1));
  const cur=p.phaseNums&&p.phaseNums[i]!==undefined?p.phaseNums[i]:(i+1)+'단계';
  const inp=document.createElement('input');
  inp.type='text';inp.value=cur;
  inp.style.cssText='width:56px;font-size:10px;font-weight:700;border:1px solid #185fa5;border-radius:7px;padding:1px 5px;outline:none;background:#fff;color:#185fa5';
  badge.replaceWith(inp);inp.focus();inp.select();
  const save=()=>{
    const val=inp.value.trim()||cur;
    if(!p.phaseNums)p.phaseNums=[];
    p.phaseNums[i]=val;
    saveProject(p);renderPG();
  };
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();save();}if(e.key==='Escape'){inp.value=cur;save();}});
}
function editPhaseName(i){
  const p=cp();if(!p)return;
  if(!p.phaseNames)p.phaseNames=[...getPhases(p)];
  const cur=p.phaseNames[i]||PH[i]||('단계 '+(i+1));
  // 해당 span을 input으로 교체
  const spans=document.querySelectorAll('.editable-phase');
  let target=null;
  spans.forEach(el=>{if(el.getAttribute('ondblclick')==='editPhaseName('+i+')')target=el;});
  if(!target)return;
  const inp=document.createElement('input');
  inp.type='text';inp.value=cur;
  inp.style.cssText='font-size:inherit;font-weight:inherit;color:inherit;border:none;border-bottom:2px solid #185fa5;outline:none;background:transparent;width:'+(Math.max(cur.length,4)*9+8)+'px;max-width:160px;padding:0;';
  target.replaceWith(inp);
  inp.focus();inp.select();
  const save=()=>{
    const v=inp.value.trim()||cur;
    p.phaseNames[i]=v;
    saveProject(p);
    if(TAB==='dash'){renderPG();renderTP();}else if(TAB==='board')renderBoard();else if(TAB==='calendar')renderCalendar();
  };
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Escape'){inp.value=cur;inp.blur();}
    e.stopPropagation();
  });
}
function toggleExpand(id){expandedTasks[id]=!expandedTasks[id];if(TAB==='dash')renderTP();else renderBoard();}
function deleteTask(id){
  const p=cp();if(!p)return;
  // 하위업무 포함 재귀 삭제
  const toDelete=new Set();
  const collect=(tid)=>{
    toDelete.add(tid);
    p.tasks.filter(t=>t.parentId===tid).forEach(c=>collect(c.id));
  };
  collect(id);
  pushUndo(p);
  p.tasks=p.tasks.filter(t=>!toDelete.has(t.id));
  saveProject(p);

let dragId=null;
function dragStart(e,id){
  dragId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  e.stopPropagation();
  setTimeout(()=>{const el=$('tr-'+id);if(el)el.classList.add('dragging');},0);
}
function dragEnd(e){
  dragId=null;
  document.querySelectorAll('.tr,.sub-tr').forEach(el=>{
    el.classList.remove('dragging','drag-over-top','drag-over-bottom','drag-child-hint');
  });
}
function dragOver(e,targetId){
  e.preventDefault();e.stopPropagation();
  if(!dragId||dragId===targetId)return;
  const p=cp();if(!p)return;
  const from=p.tasks.find(t=>t.id===dragId);
  const to=p.tasks.find(t=>t.id===targetId);
  if(!from||!to)return;
  const el=$('tr-'+targetId);if(!el)return;
  el.classList.remove('drag-over-top','drag-over-bottom','drag-child-hint');
  const rect=el.getBoundingClientRect();
  const ratio=(e.clientY-rect.top)/rect.height;
  // 같은 부모끼리: 순서 바꾸기
  // 상위 → 하위(60% 아래): 하위업무로 편입
  if(!from.parentId&&!to.parentId&&ratio>0.65){
    el.classList.add('drag-child-hint');
  } else if(ratio<0.5){
    el.classList.add('drag-over-top');
  } else {
    el.classList.add('drag-over-bottom');
  }
}
function dragLeave(e){
  if(e.currentTarget.contains(e.relatedTarget))return;
  e.currentTarget.classList.remove('drag-over-top','drag-over-bottom','drag-child-hint');
}
function dragDrop(e,targetId){
  e.preventDefault();e.stopPropagation();
  const el=e.currentTarget;
  const isChildDrop=el.classList.contains('drag-child-hint');
  const isTop=el.classList.contains('drag-over-top');
  el.classList.remove('drag-over-top','drag-over-bottom','drag-child-hint');
  if(!dragId||dragId===targetId)return;
  const p=cp();if(!p)return;
  const from=p.tasks.find(t=>t.id===dragId);
  const to=p.tasks.find(t=>t.id===targetId);
  if(!from||!to)return;
  pushUndo(p);
  if(isChildDrop){
    if(to.parentId===dragId||to.id===from.parentId)return;
    from.parentId=to.id;
    from.phase=to.phase;
    expandedTasks[to.id]=true;
  } else {
    from.parentId=to.parentId||null;
    from.phase=to.phase;
    const fromIdx=p.tasks.findIndex(t=>t.id===dragId);
    p.tasks.splice(fromIdx,1);
    let toIdx=p.tasks.findIndex(t=>t.id===targetId);
    p.tasks.splice(isTop?toIdx:toIdx+1,0,from);
  }
  saveProject(p);
  if(TAB==='dash'){renderPG();renderTP();}else renderBoard();
}
document.addEventListener('keydown',e=>{
  // Ctrl+Z 언두
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){
    if($('taskModal').classList.contains('open')||$('formModal').classList.contains('open'))return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    e.preventDefault();undoLast();return;
  }
  // Delete 키 — 마지막으로 호버한 태스크 삭제
  if(e.key==='Delete'&&!e.ctrlKey&&!e.metaKey){
    if($('taskModal').classList.contains('open')||$('formModal').classList.contains('open'))return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    const hovered=document.querySelector('.tr:hover,.sub-tr:hover');
    if(hovered){
      const id=hovered.id.replace('tr-','');
      if(id)deleteTask(id);
    }
    return;
  }
  if(e.key==='Escape'){
    if($('taskModal').classList.contains('open'))closeTaskModal();
    else if($('formModal').classList.contains('open'))closeForm();
    return;
  }
  if(e.key==='Enter'&&e.target.tagName!=='TEXTAREA'&&e.target.tagName!=='SELECT'){
    if($('taskModal').classList.contains('open')){
      if(e.target.id==='tm-child-name')return;
      e.preventDefault();saveTaskModal();return;
    }
    if($('formModal').classList.contains('open')&&e.target.tagName==='INPUT'){
      e.preventDefault();submitForm();
    }
  }
});

.pn{width:100%;padding:9px 12px;border-radius:10px;display:flex;flex-direction:column;gap:3px;cursor:pointer;border:1px solid transparent;color:#666;background:transparent;transition:all .15s;position:relative;text-align:left}
.pn:hover{background:#f5f5f3;color:#1a1a1a}
.pn.act{background:#e6f1fb;color:#0c447c;border-color:#b5d4f4}
.pn.fin{background:#eaf3de;color:#27500a;border-color:#c0dd97}
.pn-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.pn-dday{font-size:11px;font-weight:500;margin-top:1px}
.pn-dday.urgent{color:#a32d2d}.pn-dday.soon{color:#854f0b}.pn-dday.ok{color:#3b6d11}.pn-dday.done{color:#3b6d11}.pn-dday.nodday{color:#aaa}
.pn.addp{background:transparent;border:1.5px dashed #ddd;color:#aaa;font-size:12px;text-align:center;padding:9px 12px;flex-direction:row;justify-content:center;align-items:center;margin-top:4px}
.pn.addp:hover{border-color:#888;color:#555;background:#fafafa}
.ddot{position:absolute;top:8px;right:10px;width:7px;height:7px;border-radius:50%;background:#639922}
.main-wrap{flex:1;display:flex;justify-content:center;overflow-y:auto}
.main{width:100%;max-width:880px;padding:32px 28px}
.view{display:none}.view.active{display:block}
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:20px;text-align:center}
.empty-icon{width:72px;height:72px;background:#f0f0ee;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:4px}

.empty-wrap p{font-size:14px;color:#888;margin:0;line-height:1.6}
.empty-wrap button{padding:12px 28px;font-size:14px;border-radius:10px;border:none;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500;margin-top:4px}
.empty-wrap button:hover{background:#333}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;margin-bottom:40px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-ttl{font-size:15px;font-weight:600}
.modal-x{background:none;border:none;cursor:pointer;font-size:18px;color:#aaa;padding:2px 6px;border-radius:4px;line-height:1}
.modal-x:hover{background:#f0f0f0}
.modal-ft{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:13px;border-top:1px solid #f0f0f0}
.fg{margin-bottom:12px}.fl{font-size:12px;color:#666;margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 11px;font-size:13px;background:#fff;outline:none}
.fi:focus{border-color:#185fa5}.fhint{font-size:11px;color:#aaa;margin-top:3px}
.pr{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.fp{padding:5px 12px;font-size:12px;border-radius:14px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#666;user-select:none}
.fp:hover{border-color:#aaa}.fp.on{background:#e6f1fb;border-color:#185fa5;color:#0c447c;font-weight:500}
.btn-skip{padding:8px 14px;font-size:12px;border-radius:7px;border:1px solid #ddd;background:transparent;cursor:pointer;color:#aaa}
.btn-ghost{padding:8px 14px;font-size:12px;border-radius:7px;border:1px solid #ddd;background:transparent;cursor:pointer;color:#666}
.btn-ghost:hover{background:#f5f5f3}
.btn-primary{padding:8px 18px;font-size:12px;border-radius:7px;border:none;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500}
.btn-primary:hover{background:#333}
.db-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.db-ttl{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.db-sub{font-size:12px;color:#aaa;margin-top:3px}
.sbadge{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:600}
.s-act{background:#e6f1fb;color:#0c447c}.s-fin{background:#eaf3de;color:#27500a}
.tabs{display:flex;gap:5px;flex-wrap:wrap}
.tb{padding:6px 12px;font-size:12px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;user-select:none;font-weight:500;transition:background .12s,color .12s,border-color .12s}
.tb:hover{background:#f0f0ee;color:#1a1a1a}
.tb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.tb.budget-t{border-color:#ddd;color:#555;background:#fff}.tb.budget-t:hover{background:#faeeda;color:#633806}.tb.budget-t.on{background:#854f0b;color:#fff;border-color:#854f0b}
.tb.result-t{border-color:#ddd;color:#555;background:#fff}.tb.result-t:hover{background:#eaf3de;color:#27500a}.tb.result-t.on{background:#3b6d11;color:#fff;border-color:#3b6d11}
.tb.cal-t{border-color:#ddd;color:#555;background:#fff}.tb.cal-t:hover{background:#eeedfe;color:#3c3489}.tb.cal-t.on{background:#534ab7;color:#fff;border-color:#534ab7}
.tb.edit-t{color:#888;border-color:#ddd}
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.kcard{background:#f5f5f3;border-radius:10px;padding:11px 13px}
.klbl{font-size:11px;color:#aaa;margin-bottom:3px}.kval{font-size:20px;font-weight:600}
.kval.g{color:#3b6d11}.kval.a{color:#854f0b}.kval.r{color:#a32d2d}.kval.b{color:#0c447c}
.dday-banner{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:10px;margin-bottom:14px;font-size:13px;font-weight:500;flex-wrap:wrap}
.dday-banner.urgent{background:#fcebeb;border:1px solid #f09595;color:#791f1f}
.dday-banner.soon{background:#faeeda;border:1px solid #fac775;color:#633806}
.dday-banner.ok{background:#e6f1fb;border:1px solid #85b7eb;color:#0c447c}
.dday-banner.today{background:#eaf3de;border:1px solid #97c459;color:#27500a}
.dday-num{font-size:22px;font-weight:800}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:14px}
.pc{background:#fff;border:1px solid #e8e6df;border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s}
.pc:hover{border-color:#b4b2a9}.pc.sel{border:2px solid #185fa5}
.pc-top{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.pc-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pc-pct{font-size:16px;font-weight:700}.pc-nm{font-size:12px;font-weight:600}.pc-ct{font-size:11px;color:#aaa;margin-bottom:7px}
.pbar{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .4s}
.mpr{display:flex;align-items:center;gap:5px;margin-top:8px}
.mpi{width:46px;border:1px solid #ddd;border-radius:5px;padding:3px 6px;font-size:11px;text-align:center}
.mplbl{font-size:11px;color:#aaa}
.mpb{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#666}
.mpb:hover{background:#f5f5f3}
.tpanel{background:#fff;border:1px solid #e8e6df;border-radius:12px;padding:14px;margin-bottom:10px}
.tp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tp-ttl{font-size:13px;font-weight:600}.tp-x{background:none;border:none;cursor:pointer;color:#aaa;font-size:16px;padding:2px 5px;border-radius:4px}
.tp-x:hover{background:#f5f5f3}
.tr{display:flex;align-items:flex-start;gap:6px;padding:9px 10px;border:1px solid #eee;border-radius:9px;margin-bottom:5px;background:#fff}
.tr:hover{border-color:#d0d0d0}
.chk{width:16px;height:16px;border-radius:4px;border:2px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;flex-shrink:0;font-size:9px;color:#fff;user-select:none;margin-top:2px}
.chk.on{background:#185fa5;border-color:#185fa5}
.tr-main{flex:1;min-width:0}
.tr-name-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap}
.tn{font-size:12px;font-weight:500;word-break:keep-all;line-height:1.45;flex:1}
.tn.done{text-decoration:line-through;color:#aaa}
.tr-date{font-size:10px;color:#aaa;background:#f5f5f3;padding:1px 5px;border-radius:7px;white-space:nowrap;flex-shrink:0}
.tr-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.pbg{font-size:10px;padding:2px 6px;border-radius:7px;text-align:center;font-weight:500;white-space:nowrap}
.ph{background:#fcebeb;color:#791f1f}.pm{background:#faeeda;color:#633806}.pl{background:#eaf3de;color:#27500a}
.assignee-main{font-size:10px;padding:2px 7px;border-radius:8px;background:#e6f1fb;color:#0c447c;font-weight:600;white-space:nowrap}
.assignee-sub{font-size:10px;padding:2px 7px;border-radius:8px;background:#f1efe8;color:#5f5e5a;font-weight:500;white-space:nowrap}
.tr-actions{display:flex;align-items:center;gap:3px;flex-shrink:0;margin-top:1px}
.child-toggle{font-size:10px;padding:2px 6px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#185fa5;font-weight:600;white-space:nowrap}
.child-toggle:hover{background:#e6f1fb}
.child-toggle-add{font-size:10px;padding:2px 6px;border-radius:6px;border:1px dashed #ccc;background:#fff;cursor:pointer;color:#aaa;white-space:nowrap}
.child-toggle-add:hover{border-color:#888;color:#555}
.tr-edit-btn{background:none;border:none;cursor:pointer;color:#ddd;font-size:12px;padding:1px 3px}
.tr-edit-btn:hover{color:#666}
.tr-del-btn{background:none;border:none;cursor:pointer;color:#bbb;font-size:11px;font-weight:700;padding:1px 4px;opacity:0;transition:opacity .15s;border-radius:4px;line-height:1}
.tr:hover .tr-del-btn,.sub-tr:hover .tr-del-btn{opacity:1}
.tr-del-btn:hover{color:#c44;background:#fdf0f0}
/* 캘린더 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.add-row{display:flex;gap:6px;margin-top:8px}
.add-inp{flex:1;border:1px solid #ddd;border-radius:7px;padding:7px 10px;font-size:12px;outline:none}
.add-inp:focus{border-color:#185fa5}
.add-btn{padding:7px 12px;font-size:12px;border-radius:7px;border:1px solid #ddd;background:#fff;cursor:pointer;white-space:nowrap}
.add-btn:hover{background:#f5f5f3}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.mc{background:#fff;border:1px solid #e8e6df;border-radius:12px;padding:14px 16px;overflow:hidden}
.mc-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.mc-nm{font-size:12px;font-weight:600}.mc-ct{font-size:11px;color:#aaa}.mc-ts{font-size:11px;color:#666;line-height:1.6;margin-top:5px}
.sec{background:#fff;border:1px solid #e8e6df;border-radius:12px;padding:16px;margin-bottom:12px}
.sec-ttl{font-size:13px;font-weight:600;margin-bottom:13px;display:flex;align-items:center;gap:7px}
.bud-total{background:#f5f5f3;border-radius:9px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bt-lbl{font-size:12px;color:#666;flex-shrink:0;font-weight:500}.bt-val{font-size:22px;font-weight:700;flex:1}
.bt-inp{border:1px solid #ddd;border-radius:7px;padding:6px 10px;font-size:14px;width:130px;outline:none}
.bt-inp:focus{border-color:#185fa5}
.bt-save{padding:6px 14px;font-size:12px;border-radius:7px;border:none;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500}
.btn-edit{padding:6px 13px;font-size:12px;border-radius:7px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#666}
.btn-edit:hover{background:#f5f5f3}
.bcat-hd{display:grid;grid-template-columns:1fr 95px 95px 46px 24px;gap:8px;padding:4px 11px;margin-bottom:4px}
.bcat-hl{font-size:11px;color:#aaa;text-align:right}.bcat-hl:first-child{text-align:left}
.bcat-row{display:grid;grid-template-columns:1fr 95px 95px 46px 24px;align-items:center;gap:8px;padding:9px 11px;border:1px solid #eee;border-radius:8px;margin-bottom:5px}
.bcat-row:hover{border-color:#ddd}
.bcat-nm{font-size:13px;display:flex;align-items:center;gap:7px}
.cat-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.bcat-inp{border:1px solid #ddd;border-radius:6px;padding:5px 8px;font-size:12px;text-align:right;width:100%;outline:none}
.bcat-inp:focus{border-color:#185fa5}
.bcat-pct{font-size:11px;text-align:right;font-weight:600}
.bcat-rm{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:0 3px}
.bcat-rm:hover{color:#888}
.bcat-sum{display:grid;grid-template-columns:1fr 95px 95px 46px 24px;gap:8px;padding:9px 11px;background:#f5f5f3;border-radius:8px;margin-top:7px}
.bcat-sval{font-size:13px;font-weight:700;text-align:right}
.bbar{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.bb{padding:7px 13px;font-size:12px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#666}
.bb:hover{background:#f5f5f3}
.bud-bar-wrap{height:9px;background:#f0f0f0;border-radius:5px;overflow:hidden;display:flex;margin:10px 0 14px}
.bud-seg{height:100%}
.notice{border-radius:9px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:500;flex-wrap:wrap}
.n-amber{background:#faeeda;border:1px solid #fac775;color:#633806}
.n-green{background:#eaf3de;border:1px solid #97c459;color:#27500a}
.n-blue{background:#e6f1fb;border:1px solid #85b7eb;color:#0c447c}
.n-btn{margin-left:auto;padding:4px 11px;font-size:11px;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:500}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.rg{display:flex;flex-direction:column;gap:4px}.rl{font-size:11px;color:#666;font-weight:500}
.ri{border:1px solid #ddd;border-radius:7px;padding:7px 10px;font-size:13px;background:#fff;outline:none;width:100%}
.ri:focus{border-color:#185fa5}
.rta{border:1px solid #ddd;border-radius:7px;padding:8px 10px;font-size:12px;background:#fff;width:100%;resize:vertical;min-height:60px;outline:none;font-family:inherit}
.rta:focus{border-color:#185fa5}
.star-row{display:flex;gap:5px;margin-top:3px}
.star{font-size:24px;cursor:pointer;color:#ddd;user-select:none;transition:color .1s}
.star.on{color:#ba7517}
.chip-wrap{display:flex;gap:6px;flex-wrap:wrap;border:1px solid #ddd;border-radius:7px;padding:6px 9px;min-height:38px;align-items:center}
.chip{background:#e6f1fb;color:#0c447c;font-size:11px;padding:3px 9px;border-radius:10px;display:flex;align-items:center;gap:4px;font-weight:500}
.chip button{background:none;border:none;cursor:pointer;color:#185fa5;font-size:14px;line-height:1;padding:0}
.tag-in{border:none;outline:none;font-size:12px;background:transparent;min-width:70px;font-family:inherit}
.save-btn{padding:9px 20px;font-size:13px;border-radius:8px;border:none;background:#3b6d11;color:#eaf3de;cursor:pointer;font-weight:600}
.save-btn:hover{background:#27500a}
.drag-handle{font-size:14px;color:#ccc;cursor:grab;padding:0 4px 0 0;flex-shrink:0;user-select:none;margin-top:1px}
.drag-handle:hover{color:#888}
.tr.dragging,.sub-tr.dragging{opacity:.35;border-style:dashed}
.tr.drag-over-top,.sub-tr.drag-over-top .sub-tr-body{border-top:2px solid #185fa5!important}
.tr.drag-over-bottom,.sub-tr.drag-over-bottom .sub-tr-body{border-bottom:2px solid #185fa5!important}
.tr.drag-child-hint{border:1.5px solid #185fa5;background:#eef6ff;position:relative}
.tr.drag-child-hint::after{content:'📎 하위로';font-size:9px;color:#185fa5;position:absolute;right:6px;top:3px}
/* 하위업무 그룹 */
.sub-group{margin:2px 0 6px 24px;border-left:2px solid #d4e8f8;padding-left:0}
.sub-tr{display:flex;align-items:center;position:relative;margin-bottom:3px}
.sub-tr-line{width:14px;height:1px;background:#c8dff0;flex-shrink:0}
.sub-tr-body{flex:1;display:flex;align-items:center;gap:6px;padding:5px 9px;background:#f4f9fe;border:1px solid #ddeef8;border-radius:7px;min-width:0}
.sub-tr-body:hover{border-color:#a8ccec;background:#eaf3fb}
.sub-tr-body .tn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.sub-tr-body .chk{width:15px;height:15px;flex-shrink:0;font-size:9px;border-radius:3px}
.sub-inline{margin-left:36px;margin-bottom:6px;background:#f4f9fe;border-radius:8px;padding:6px 8px;border:1px dashed #b5d4f4}
.task-2col{display:flex;flex-direction:column;gap:0}
.board-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start}
.inline-add-row{display:flex;gap:6px;align-items:center;padding:5px 0 2px;margin-bottom:2px}
/* 공유 메모 */
.shared-memo-wrap{background:#fffdf0;border:1.5px solid #f0e6a0;border-radius:12px;padding:14px 16px;margin-bottom:14px}
.shared-memo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:13px;font-weight:600;color:#6b5800}
.shared-memo-ta{width:100%;border:1px solid #e8d97a;border-radius:8px;padding:10px 12px;font-size:13px;background:#fff;resize:vertical;min-height:72px;outline:none;font-family:inherit;line-height:1.6;color:#333;transition:border-color .2s}
.shared-memo-ta:focus{border-color:#c9a800}
/* 팀 그리드 */
.team-summary{display:flex;align-items:center;padding:8px 12px;background:#f5f5f3;border-radius:8px;margin-bottom:14px}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
/* 팀 탭 드래그 */
.team-member-card{background:#fff;border:1px solid #e8e6df;border-radius:14px;padding:16px 18px;transition:border-color .15s}
/* 탭 드래그 */
.tb{cursor:grab}
.tb.tab-drag-over{border-color:#185fa5;background:#e6f1fb;color:#0c447c}
.tmc-task{display:flex;align-items:center;gap:7px;padding:6px 2px;border-bottom:1px solid #f0f0ee;font-size:12px;cursor:grab;transition:background .1s}
.tmc-task:hover{background:#f8f8f6}
.tmc-task:active{cursor:grabbing}
.tmc-task:last-child{border-bottom:none}
.tmc-task.tmc-done .tmc-task-name{text-decoration:line-through;color:#aaa}
.tmc-task-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.team-member-card.tmc-drag-target{border-color:#185fa5;border-width:2px;background:#f0f7ff}
.tmc-drop-hint{display:none;align-items:center;justify-content:center;gap:8px;padding:10px;margin:6px 0;background:#e6f1fb;border:2px dashed #185fa5;border-radius:8px;font-size:12px;font-weight:600;color:#185fa5}
.tmc-empty{font-size:12px;color:#bbb;padding:12px 0;text-align:center}
.tmc-hd{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.rank-badge{font-size:11px;background:#f1efe8;color:#5f5e5a;padding:2px 9px;border-radius:8px;font-weight:600}
.role-badge{font-size:11px;padding:3px 10px;border-radius:8px;font-weight:600}
.main-badge{background:#e6f1fb;color:#0c447c}
.sub-badge{background:#f1efe8;color:#5f5e5a}
.tmc-phases{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.tmc-phase-block{background:#f9f9f7;border-radius:9px;padding:10px 12px}
.tmc-phase-hd{display:flex;align-items:center;margin-bottom:7px}
.tmc-chk{width:15px;height:15px;border-radius:3px;border:2px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;flex-shrink:0;font-size:9px;color:#fff;user-select:none;transition:background .12s,border-color .12s}
.tmc-chk.on{background:#185fa5;border-color:#185fa5}
.tmc-chk:hover{border-color:#185fa5}
.tmc-task-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.tmc-task-name:hover{color:#185fa5}
.role-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.main-dot{background:#185fa5}
.sub-dot{background:#c0bdb5}
.task-hint{font-size:12px;color:#888;background:#f5f5f3;border-radius:8px;padding:8px 14px;margin-bottom:12px}
.task-hint strong{color:#555}
.panel-promote-hint{font-size:11px;color:#ccc;text-align:center;padding:6px 0;margin:4px 0;border-radius:6px;transition:all .15s;border:1px dashed transparent}
.panel-promote-hint.panel-hint-active{color:#185fa5;background:#eef6ff;border-color:#b5d4f4}
.tpanel.panel-drop-active{border-color:#185fa5;border-width:2px}
.phase-num-badge{font-size:10px;font-weight:700;background:#e8e6df;color:#666;padding:1px 7px;border-radius:7px;flex-shrink:0}
.phase-num-badge-sm{font-size:10px;font-weight:700;background:#e8e6df;color:#666;padding:1px 6px;border-radius:6px}
.editable-phase-num{cursor:pointer;transition:background .12s}
.editable-phase-num:hover{background:#d0cdc5;color:#333}
.pc-add{background:#fff;border:2px dashed #ddd;border-radius:12px;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100px;transition:border-color .15s}
.pc-add:hover{border-color:#888;background:#fafafa}
.editable-phase{cursor:pointer;border-radius:4px;padding:1px 3px;transition:background .12s}
.editable-phase:hover{background:rgba(0,0,0,.06)}
.pc.pc-drag-over{border:2px dashed #185fa5;background:#f0f7ff}
.pc-add{cursor:pointer}
.editable-phase:hover{background:rgba(0,0,0,.06)}
.editable-phase:hover::after{content:' ✏️';font-size:10px;opacity:.5}
.cal-head{font-size:11px;font-weight:700;color:#aaa;text-align:center;padding:6px 2px}
.cal-cell{min-height:80px;background:#fff;border:1px solid #f0f0f0;border-radius:6px;padding:4px;overflow:hidden;cursor:pointer;transition:border-color .12s;min-width:0;word-break:break-all}
.cal-cell:hover{border-color:#b5d4f4;background:#f8fbff}
.cal-cell.cal-empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.cal-cell.cal-today{border-color:#185fa5;border-width:2px}
.cal-day-num{font-size:11px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;min-width:0}
.cal-add-hint{font-size:12px;font-weight:400;color:#ddd;line-height:1;flex-shrink:0}
.cal-cell:hover .cal-add-hint{color:#185fa5}
.cal-cell.cal-today .cal-day-num{color:#185fa5}
.cal-task-dot{font-size:9px;padding:1px 3px;border-radius:3px;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;display:block;cursor:pointer}
.cal-more{font-size:9px;color:#aaa;font-weight:600}

  /* 태스크 카드: 배지 줄이고 텍스트 우선 */
  .board-2col{grid-template-columns:1fr}
  .tr{padding:7px 8px;gap:5px}
  .tn{font-size:12px;word-break:keep-all;white-space:normal;line-height:1.4}

  .sub-group{margin-left:12px}

  /* 팀 그리드 */
  .team-grid{grid-template-columns:1fr}

  /* 캘린더 */
  .cal-grid{gap:2px}
  .cal-cell{min-height:50px;padding:3px}
  .cal-task-dot{font-size:8px;padding:0 2px}
  .cal-day-num{font-size:10px}
  .cal-add-hint{display:none}
  /* 예산 */
  .bcat-hd,.bcat-row{grid-template-columns:1fr 60px 60px 44px 24px;font-size:11px}
  /* 모달 */
  .modal{width:96vw;max-height:90vh;overflow-y:auto;margin:5vh auto;padding:16px}
  .g2{grid-template-columns:1fr}
  /* tpanel */
  .tpanel{padding:11px 10px}
  /* 디데이 배너 */
  .dday-banner{font-size:12px;padding:9px 11px;flex-wrap:wrap;gap:4px}

  .shared-memo-ta{min-height:52px;font-size:12px}

  .sb-overlay{display:block}
  /* 태스크 힌트 */
  .task-hint{font-size:11px;padding:6px 10px}

@media(min-width:769px){

  .sb-overlay{display:none}
